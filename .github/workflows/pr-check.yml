name: PR Checks
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate PR title
        uses: amitsingh-007/validate-pr-title-action@v6
        with:
          pattern: '^feat|fix|chore|docs|style|refactor|test|ci:'
          error-message: 'PR title must follow conventional commits'

  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: pnpm install
      - name: Run Lint
        run: pnpm lint
