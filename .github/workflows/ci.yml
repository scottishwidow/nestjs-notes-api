name: CI Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: pnpm install
      - name: Build app
        run: pnpm build
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nextjs-notes-build
          path: .next/
